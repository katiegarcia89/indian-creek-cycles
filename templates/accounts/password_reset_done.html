{% extends 'base.html' %}

{% block title %}Check Your Email - Indian Creek Cycles{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">Check Your Email</h1>
                <p class="auth-subtitle">If that email matches an account, a password reset link is on its way.</p>
            </div>

            <div class="auth-footer">
                <p>Still need help? <a href="{% url 'contact' %}">Contact us</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
